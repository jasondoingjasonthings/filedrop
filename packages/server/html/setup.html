<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FileDrop · Setup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#080808;color:#efefef;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{width:380px;background:#111;border:1px solid #232323;border-radius:16px;padding:40px 36px;display:flex;flex-direction:column;gap:20px;box-shadow:0 32px 80px #000a}
.logo{font-size:24px;font-weight:800;letter-spacing:-.04em}.logo em{color:#f97316;font-style:normal}
h2{font-size:15px;color:#666;font-weight:400}
.field{display:flex;flex-direction:column;gap:6px}
.field label{font-size:12px;color:#666;text-transform:uppercase;letter-spacing:.06em}
.field input{background:#171717;border:1px solid #2e2e2e;border-radius:8px;color:#efefef;padding:10px 14px;font-size:14px;outline:none;transition:border-color .15s}
.field input:focus{border-color:#f97316}
.btn{background:#f97316;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s}
.btn:hover{background:#c2550d}
.err{color:#ef4444;font-size:13px;display:none}
.done{text-align:center;display:none;flex-direction:column;gap:12px;align-items:center}
.done p{color:#666;font-size:14px}
.checkmark{font-size:48px}
</style>
</head>
<body>
<div class="box">
  <div class="logo">File<em>Drop</em></div>
  <h2>First time setup — create your owner account</h2>
  <div id="form" style="display:flex;flex-direction:column;gap:16px">
    <div class="field">
      <label>Username</label>
      <input type="text" id="user" placeholder="jason" autocomplete="username">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pass" placeholder="Min 8 characters" autocomplete="new-password">
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="pass2" placeholder="Repeat password" autocomplete="new-password">
    </div>
    <div class="err" id="err"></div>
    <button class="btn" id="btn">Create account</button>
  </div>
  <div class="done" id="done">
    <div class="checkmark">✓</div>
    <strong>Account created!</strong>
    <p>Redirecting to dashboard…</p>
  </div>
</div>
<script>
document.getElementById('btn').addEventListener('click', async () => {
  const user = document.getElementById('user').value.trim();
  const pass = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  const err = document.getElementById('err');
  err.style.display = 'none';
  if (!user) { err.textContent='Username required'; err.style.display='block'; return; }
  if (pass.length < 8) { err.textContent='Password must be at least 8 characters'; err.style.display='block'; return; }
  if (pass !== pass2) { err.textContent='Passwords do not match'; err.style.display='block'; return; }
  try {
    const res = await fetch('/setup/complete', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({username:user, password:pass})
    });
    const data = await res.json();
    if (!res.ok) { err.textContent=data.error||'Setup failed'; err.style.display='block'; return; }
    document.getElementById('form').style.display = 'none';
    document.getElementById('done').style.display = 'flex';
    setTimeout(() => window.location.href = '/', 1500);
  } catch(e) { err.textContent='Network error'; err.style.display='block'; }
});
document.getElementById('pass2').addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('btn').click();
});
</script>
</body>
</html>
